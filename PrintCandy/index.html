<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PeriPage Voice Print Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Segoe UI', sans-serif; text-align: center; background: #f0f2f5; padding: 20px; }
        .card { background: white; border-radius: 20px; padding: 25px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); max-width: 450px; margin: auto; }
        button { background: #6200ee; color: white; border: none; padding: 12px 20px; border-radius: 12px; font-size: 15px; margin: 5px; cursor: pointer; width: 100%; transition: 0.2s; }
        button:active { transform: scale(0.98); }
        button:disabled { background: #ccc; }
        .btn-secondary { background: #03dac6; color: black; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        #status { font-weight: bold; color: #6200ee; margin: 15px 0; min-height: 1.2em; }
        canvas { border: 1px solid #ddd; margin-top: 10px; background: white; width: 100%; height: auto; display: none; }
    </style>
</head>
<body>

<div class="card">
    <h2>PeriPage A6 Voice Control</h2>
    
    <label>Muster (RegEx):</label>
    <input type="text" id="pattern" value="Zahl (\d{4}) bitte" placeholder="z.B. Zahl (\d{4}) bitte">
    
    <button id="btnConnect">1. Drucker suchen & verbinden</button>
    <button id="btnListen" disabled>2. Spracherkennung starten</button>
    <button id="btnFeed" class="btn-secondary" disabled>Test: Papier schieben</button>

    <div id="status">Bereit.</div>
    <canvas id="canvas" width="384" height="240"></canvas>
</div>

<script>
    let printerChar = null;
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const status = document.getElementById('status');

    // Liste der bekannten PeriPage Services
    const UUID_SERVICES = [
        '0000af30-0000-1000-8000-00805f9b34fb', // Standard A6
        '0000ff00-0000-1000-8000-00805f9b34fb', // Variante B
        '49535343-fe7d-4ae5-8fa9-9fafd205e455'  // Variante C
    ];

    // 1. Verbindung mit Service-Scanning
    document.getElementById('btnConnect').onclick = async () => {
        try {
            status.innerText = "Suche PeriPage...";
            const device = await navigator.bluetooth.requestDevice({
                filters: [{ namePrefix: 'PeriPage' }],
                optionalServices: UUID_SERVICES
            });

            const server = await device.gatt.connect();
            status.innerText = "Verbunden. Prüfe Services...";

            let service;
            for (const uuid of UUID_SERVICES) {
                try {
                    service = await server.getPrimaryService(uuid);
                    if (service) break;
                } catch (e) { /* Service nicht gefunden, versuche nächsten */ }
            }

            if (!service) throw new Error("Kein passender Service gefunden.");

            const characteristics = await service.getCharacteristics();
            // Suche Charakteristik, die Schreiben erlaubt
            printerChar = characteristics.find(c => c.properties.write || c.properties.writeWithoutResponse);

            if (!printerChar) throw new Error("Schreib-Modul nicht gefunden.");

            status.innerText = "Bereit! (Service: " + service.uuid.substring(4,8) + ")";
            document.getElementById('btnListen').disabled = false;
            document.getElementById('btnFeed').disabled = false;
        } catch (err) {
            status.innerText = "Fehler: " + err.message;
        }
    };

    // 2. Spracherkennung
    const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    recognition.lang = 'de-DE';
    recognition.continuous = true;

    document.getElementById('btnListen').onclick = () => {
        recognition.start();
        status.innerText = "Höre zu... Sprich das Muster!";
    };

    recognition.onresult = (event) => {
        const text = event.results[event.results.length - 1][0].transcript;
        const regex = new RegExp(document.getElementById('pattern').value, "i");
        const match = text.match(regex);

        if (match && match[1]) {
            status.innerText = "Erkannt: " + match[1] + ". Drucke...";
            renderAndPrint(match[1]);
        }
    };

    // 3. Grafik für Querformat
    function renderAndPrint(number) {
        ctx.fillStyle = "white";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "black";
        ctx.font = "bold 100px 'Dancing Script'";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";

        ctx.save();
        ctx.translate(canvas.width / 2, canvas.height / 2);
        ctx.rotate(Math.PI / 2); // Querformat
        ctx.fillText(number, 0, 0);
        ctx.restore();

        printCanvas();
    }

    // 4. Druck-Protokoll (Line-by-Line)
    async function printCanvas() {
        if (!printerChar) return;

        // Wake up / Reset
        await sendData(new Uint8Array([0x10, 0xff, 0x2f, 0x11])); 
        
        const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const pixels = imgData.data;
        const width = canvas.width;
        const height = canvas.height;
        const bytesPerLine = width / 8;

        for (let y = 0; y < height; y++) {
            let bitmapLine = new Uint8Array(bytesPerLine);
            for (let x = 0; x < width; x++) {
                const idx = (y * width + x) * 4;
                const brightness = (pixels[idx] + pixels[idx+1] + pixels[idx+2]) / 3;
                if (brightness < 128) {
                    bitmapLine[Math.floor(x / 8)] |= (0x80 >> (x % 8));
                }
            }
            
            // Befehl: Drucke Bitmap Zeile (0x12 0x54)
            await sendData(new Uint8Array([0x12, 0x54, bytesPerLine]));
            await sendData(bitmapLine);
        }

        // Papiervorschub
        await sendData(new Uint8Array([0x1b, 0x4a, 0x64]));
        status.innerText = "Druck beendet.";
    }

    // Test Button: Nur Papier schieben
    document.getElementById('btnFeed').onclick = () => {
        sendData(new Uint8Array([0x1b, 0x4a, 0x64]));
    };

    // Hilfsfunktion: Senden mit kleiner Verzögerung
    async function sendData(data) {
        const chunkSize = 20;
        for (let i = 0; i < data.length; i += chunkSize) {
            const chunk = data.slice(i, i + chunkSize);
            // Nutze writeWithoutResponse für bessere Performance bei Grafik
            await printerChar.writeValueWithoutResponse(chunk);
            await new Promise(r => setTimeout(r, 5)); // 5ms Pause
        }
    }
</script>
</body>
</html>
