<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PeriPage Voice Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@700&family=Dancing+Script:wght@700&family=Great+Vibes&family=Pacifico&family=Satisfy&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #6200ee; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; text-align: center; background: var(--bg); padding: 15px; margin: 0; }
        .card { background: white; border-radius: 20px; padding: 20px; box-shadow: 0 8px 25px rgba(0,0,0,0.1); max-width: 450px; margin: auto; }
        
        h1 { color: var(--primary); font-size: 1.3rem; margin-top: 0; }
        
        .btn { width: 100%; padding: 16px; border: none; border-radius: 12px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.2s; margin-bottom: 10px; }
        .btn-listen { background: var(--primary); color: white; }
        .btn-listen.active { background: #ef4444; animation: pulse 1.5s infinite; }
        
        .setting-group { text-align: left; margin-bottom: 15px; background: #fafafa; padding: 12px; border-radius: 10px; border: 1px solid #eee; }
        label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 13px; color: #666; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 15px; box-sizing: border-box; }

        #fontPreview { 
            margin: 10px 0; 
            padding: 10px; 
            background: white; 
            border: 1px dashed #ccc; 
            font-size: 35px; 
            min-height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #status { font-weight: bold; color: var(--primary); margin: 10px 0; height: 1.2em; }
        canvas { display: none; }
        
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.7; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>

<div class="card">
    <h1>PeriPage A6 Voice Print</h1>
    
    <div id="status">Bereit.</div>

    <button id="startBtn" class="btn btn-listen" onclick="toggleRecognition()">🎤 Zuhören starten</button>

    <div class="setting-group">
        <label>Muster (RegEx):</label>
        <input type="text" id="pattern" value="Zahl (\d{4}) bitte" onchange="saveSettings()">
    </div>

    <div class="setting-group">
        <label>Schriftart:</label>
        <select id="fontSelect" onchange="updateFontPreview()">
            <option value="'Dancing Script', cursive">Dancing Script</option>
            <option value="'Pacifico', cursive">Pacifico (Dick)</option>
            <option value="'Caveat', cursive">Caveat (Echt)</option>
            <option value="'Satisfy', cursive">Satisfy (Brush)</option>
            <option value="'Great Vibes', cursive">Great Vibes (Elegant)</option>
        </select>
        <div id="fontPreview">1234</div>
    </div>

    <div class="setting-group">
        <label>Extra Vorschub (Papier):</label>
        <input type="range" id="feed" min="0" max="800" value="200" onchange="saveSettings()">
    </div>

    <button class="btn" style="background: #ddd;" onclick="generateAndPrint('1234')">Test-Druck (1234)</button>
    
    <canvas id="canvas"></canvas>
</div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const status = document.getElementById('status');
    const startBtn = document.getElementById('startBtn');
    
    let isListening = false;
    let recognition;

    // --- EINSTELLUNGEN LADEN/SPEICHERN ---
    function saveSettings() {
        const settings = {
            pattern: document.getElementById('pattern').value,
            font: document.getElementById('fontSelect').value,
            feed: document.getElementById('feed').value
        };
        localStorage.setItem('peripage_settings', JSON.stringify(settings));
        updateFontPreview();
    }

    function loadSettings() {
        const saved = localStorage.getItem('peripage_settings');
        if (saved) {
            const s = JSON.parse(saved);
            document.getElementById('pattern').value = s.pattern;
            document.getElementById('fontSelect').value = s.font;
            document.getElementById('feed').value = s.feed;
        }
        updateFontPreview();
    }

    function updateFontPreview() {
        const font = document.getElementById('fontSelect').value;
        const preview = document.getElementById('fontPreview');
        preview.style.fontFamily = font;
        saveSettings();
    }

    // --- SPRACHERKENNUNG ---
    function toggleRecognition() {
        if (isListening) { recognition.stop(); return; }

        recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'de-DE';
        recognition.continuous = true;

        recognition.onstart = () => {
            isListening = true;
            startBtn.classList.add('active');
            startBtn.innerText = "🛑 Stoppen";
            status.innerText = "Ich höre zu...";
        };

        recognition.onresult = (event) => {
            const transcript = event.results[event.results.length - 1][0].transcript;
            status.innerText = "Gehört: " + transcript;
            
            const regex = new RegExp(document.getElementById('pattern').value, "i");
            const match = transcript.match(regex);

            if (match && match[1]) {
                status.innerText = "Match! Drucke " + match[1];
                generateAndPrint(match[1]);
            }
        };

        recognition.onend = () => {
            isListening = false;
            startBtn.classList.remove('active');
            startBtn.innerText = "🎤 Zuhören starten";
        };

        recognition.start();
    }

    // --- DRUCK-GENERIERUNG ---
    function generateAndPrint(text) {
        const feedValue = parseInt(document.getElementById('feed').value);
        const selectedFont = document.getElementById('fontSelect').value;
        
        canvas.width = 384;
        canvas.height = 400 + feedValue;

        // Weißer Hintergrund
        ctx.fillStyle = "#FFFFFF";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        // Text
        ctx.fillStyle = "#000000";
        ctx.font = `bold 140px ${selectedFont}`;
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        
        ctx.save();
        ctx.translate(canvas.width / 2, 200);
        ctx.rotate(Math.PI / 2); // Querformat
        ctx.fillText(text, 0, 0);
        ctx.restore();

        const dataUrl = canvas.toDataURL("image/png");
        const base64Data = dataUrl.split(',')[1];
        
        // Intent zu RawBT
        const intentUrl = `intent:base64,${base64Data}#Intent;scheme=rawbt;package=ru.a402d.rawbtprinter;S.orientation=portrait;end;`;
        
        window.location.href = intentUrl;
    }

    // Initialisierung
    window.onload = loadSettings;
</script>

</body>
</html>
