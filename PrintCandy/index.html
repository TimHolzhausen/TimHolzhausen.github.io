<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PeriPage Debugger</title>
    <style>
        body { font-family: monospace; background: #222; color: #0f0; padding: 10px; font-size: 12px; }
        .controls { background: #333; padding: 15px; border-radius: 10px; margin-bottom: 10px; }
        button { width: 100%; padding: 12px; margin: 5px 0; cursor: pointer; font-weight: bold; }
        #log { background: #000; border: 1px solid #555; height: 300px; overflow-y: scroll; padding: 10px; white-space: pre-wrap; }
        .status-dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; background: red; margin-right: 5px; }
    </style>
</head>
<body>

<div class="controls">
    <h3 style="color:white; margin:0 0 10px 0;">PeriPage Debug Console</h3>
    <button onclick="connect()">1. Verbinden & Services scannen</button>
    <button id="btnFeed" onclick="testFeeds()" disabled>2. Teste 3 Vorschub-Arten</button>
    <button id="btnPrint" onclick="testSmallPrint()" disabled>3. Test-Punkt drucken</button>
</div>

<div id="log">--- Debug Log gestartet ---</div>

<script>
    let device, server, service, printerChar;
    const logEl = document.getElementById('log');

    function log(msg) {
        const time = new Date().toLocaleTimeString();
        logEl.innerHTML += `[${time}] ${msg}\n`;
        logEl.scrollTop = logEl.scrollHeight;
        console.log(msg);
    }

    async function connect() {
        try {
            log("Suche Geräte...");
            device = await navigator.bluetooth.requestDevice({
                filters: [{ namePrefix: 'PeriPage' }, { namePrefix: 'A6' }],
                optionalServices: [0xFF00, 0xAF30, '49535343-fe7d-4ae5-8fa9-9fafd205e455']
            });

            log("Verbinde mit GATT Server...");
            server = await device.gatt.connect();

            log("Suche Primäre Services...");
            const services = await server.getPrimaryServices();
            log(`Gefunden: ${services.length} Services`);

            for (let s of services) {
                log(`Service: ${s.uuid}`);
                const chars = await s.getCharacteristics();
                for (let c of chars) {
                    let props = [];
                    if (c.properties.write) props.push("WRITE");
                    if (c.properties.writeWithoutResponse) props.push("WRITE_NO_RESP");
                    if (c.properties.notify) props.push("NOTIFY");
                    log(`  -> Char: ${c.uuid} [${props.join(", ")}]`);
                    
                    // Wir nehmen die 0xFF02 oder die erste Schreib-Charakteristik
                    if (c.uuid.includes('ff02') || c.uuid.includes('af31') || (props.includes("WRITE") && !printerChar)) {
                        printerChar = c;
                        service = s;
                    }
                }
            }

            if (printerChar) {
                log(`>>> GEWÄHLT: ${printerChar.uuid} im Service ${service.uuid}`);
                document.getElementById('btnFeed').disabled = false;
                document.getElementById('btnPrint').disabled = false;
                // Wake up
                await sendRaw([0x10, 0xff, 0x2f, 0x11]);
            } else {
                log("FEHLER: Keine Schreib-Charakteristik gefunden!");
            }

        } catch (err) {
            log("CRASH: " + err);
        }
    }

    async function testFeeds() {
        log("Teste Vorschub Typ 1 (Standard ESC/POS)...");
        await sendRaw([0x1b, 0x4a, 0x40]); 
        await new Promise(r => setTimeout(r, 500));

        log("Teste Vorschub Typ 2 (PeriPage Alt)...");
        await sendRaw([0x0a, 0x0d]); 
        await new Promise(r => setTimeout(r, 500));

        log("Teste Vorschub Typ 3 (PeriPage Spezial)...");
        await sendRaw([0x10, 0xff, 0x30, 0x11, 0x1b, 0x4a, 0x40]);
    }

    async function testSmallPrint() {
        log("Sende Test-Pixel-Zeile...");
        // Init + Grafik-Kommando + 48 Bytes schwarze Punkte
        const lineHeader = [0x12, 0x54, 0x30]; // 0x30 = 48 Bytes
        const blackLine = new Array(48).fill(0xff); 
        await sendRaw([0x10, 0xff, 0x2f, 0x11, ...lineHeader, ...blackLine, 0x1b, 0x4a, 0x40]);
    }

    async function sendRaw(dataArray) {
        if (!printerChar) return;
        const data = new Uint8Array(dataArray);
        log(`Sende ${data.length} Bytes...`);
        
        try {
            // Wir probieren beide Methoden, falls eine fehlschlägt
            if (printerChar.properties.writeWithoutResponse) {
                await printerChar.writeValueWithoutResponse(data);
            } else {
                await printerChar.writeValueWithResponse(data);
            }
            log("Senden OK");
        } catch (e) {
            log("Sende-Fehler: " + e.message);
        }
    }
</script>

</body>
</html>
