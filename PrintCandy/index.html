<style>
    /* ... (vorheriges CSS beibehalten) ... */
    canvas { 
        display: block; 
        margin: 20px auto; 
        border: 2px solid #333; 
        background: white;
        image-rendering: pixelated; /* Verhindert Unschärfe am Handy */
    }
</script>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const status = document.getElementById('status');

    function startRecognition() {
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'de-DE';
        recognition.start();
        status.innerText = "Höre zu...";

        recognition.onresult = (event) => {
            const transcript = event.results[event.results.length - 1][0].transcript;
            const match = transcript.match(new RegExp(document.getElementById('pattern').value, "i"));

            if (match && match[1]) {
                status.innerText = "Erkannt: " + match[1];
                generateAndPrint(match[1]);
            } else {
                status.innerText = "Nicht erkannt: " + transcript;
            }
        };
    }

    function generateAndPrint(text) {
        // 384px ist die magische Breite für PeriPage A6
        canvas.width = 384;
        canvas.height = 600; // Genug Platz für die gedrehte Zahl

        // 1. Hintergrund absolut weiß (wichtig für Thermo!)
        ctx.fillStyle = "#FFFFFF";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        // 2. Text-Style (Sehr fett für Thermo-Drucker empfohlen)
        ctx.fillStyle = "#000000";
        ctx.font = "bold 160px 'Dancing Script'"; 
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        
        // 3. Transformation
        ctx.save();
        ctx.translate(canvas.width / 2, canvas.height / 2);
        ctx.rotate(Math.PI / 2); // 90 Grad drehen
        
        // 4. Text zeichnen
        ctx.fillText(text, 0, 0);
        ctx.restore();

        // Canvas jetzt sichtbar machen zur Kontrolle
        canvas.style.display = "block";

        // 5. Export zu RawBT
        setTimeout(() => {
            const dataUrl = canvas.toDataURL("image/png");
            const base64Data = dataUrl.split(',')[1];
            // Intent mit Parametern für RawBT, um Skalierung zu minimieren
            const intentUrl = `intent:base64,${base64Data}#Intent;scheme=rawbt;package=ru.a402d.rawbtprinter;S.orientation=portrait;end;`;
            window.location.href = intentUrl;
        }, 100); // Kurze Pause damit User das Bild kurz sieht
    }

    function sendFeed() {
        // Erzeugt ein leeres weißes Bild für Vorschub
        canvas.width = 384;
        canvas.height = 200;
        ctx.fillStyle = "white";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        const dataUrl = canvas.toDataURL("image/png");
        window.location.href = `intent:base64,${dataUrl.split(',')[1]}#Intent;scheme=rawbt;package=ru.a402d.rawbtprinter;end;`;
    }

    function printExample() {
        generateAndPrint("1234");
    }
</script>
