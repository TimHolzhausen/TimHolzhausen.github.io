<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PeriPage Fix</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    <style>
        body { font-family: sans-serif; text-align: center; background: #f0f0f0; padding: 20px; }
        .card { background: white; border-radius: 15px; padding: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 400px; margin: auto; }
        button { width: 100%; padding: 15px; margin: 10px 0; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .btn-main { background: #6200ee; color: white; }
        .btn-test { background: #ddd; }
        #status { margin: 10px; color: #6200ee; font-weight: bold; }
        
        /* Die Vorschau wird hier erzwungen */
        #canvas { 
            border: 2px solid #000; 
            background: white; 
            width: 100%; /* Zeigt es groß auf dem Handy an */
            height: auto;
            margin-top: 15px;
            image-rendering: pixelated;
        }
        input { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
    </style>
</head>
<body>

<div class="card">
    <h2>PeriPage A6 Preview Fix</h2>
    <input type="text" id="pattern" value="Zahl (\d{4}) bitte">
    
    <button class="btn-main" onclick="startRecognition()">Spracherkennung</button>
    <button class="btn-test" onclick="generatePreview('1234')">Vorschau: 1234</button>
    <button id="btnPrint" class="btn-main" style="background: #10b981; display: none;" onclick="sendToRawBT()">JETZT DRUCKEN</button>

    <div id="status">Warte auf Eingabe...</div>
    
    <p><small>Vorschau (was an den Drucker geht):</small></p>
    <canvas id="canvas" width="384" height="600"></canvas>
</div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const status = document.getElementById('status');
    let lastGeneratedBase64 = "";

    // Sicherstellen, dass die Schriftart geladen ist
    document.fonts.ready.then(() => {
        status.innerText = "Schreibschrift geladen. Bereit!";
        drawInitial();
    });

    function drawInitial() {
        ctx.fillStyle = "white";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#ccc";
        ctx.font = "30px sans-serif";
        ctx.textAlign = "center";
        ctx.fillText("Vorschau erscheint hier", canvas.width/2, canvas.height/2);
    }

    function startRecognition() {
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'de-DE';
        recognition.start();
        status.innerText = "Ich höre zu...";

        recognition.onresult = (event) => {
            const transcript = event.results[0][0].transcript;
            const match = transcript.match(new RegExp(document.getElementById('pattern').value, "i"));

            if (match && match[1]) {
                status.innerText = "Erkannt: " + match[1];
                generatePreview(match[1]);
            } else {
                status.innerText = "Nicht erkannt: " + transcript;
            }
        };
    }

    function generatePreview(text) {
        // 1. Canvas säubern
        ctx.fillStyle = "#FFFFFF";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // 2. Text zeichnen
        ctx.fillStyle = "#000000";
        ctx.font = "bold 140px 'Dancing Script'";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";

        ctx.save();
        ctx.translate(canvas.width / 2, canvas.height / 2);
        ctx.rotate(Math.PI / 2);
        ctx.fillText(text, 0, 0);
        ctx.restore();

        // 3. Base64 speichern und Button zeigen
        lastGeneratedBase64 = canvas.toDataURL("image/png").split(',')[1];
        document.getElementById('btnPrint').style.display = "block";
        status.innerText = "Vorschau bereit. Klicke auf Drucken!";
    }

function sendToRawBT() {
    if (!lastGeneratedBase64) return;
    
    // Wir nutzen das "rawbt:" Präfix, das ist oft stabiler als der lange "intent:" Link
    // Wir sagen RawBT explizit, dass es sich um ein PNG handelt
    const uri = "data:image/png;base64," + lastGeneratedBase64;
    
    // Alternative Intent-Struktur, die RawBT zwingt, das als Bild zu behandeln
    const intentUrl = `intent:${uri}#Intent;scheme=rawbt;package=ru.a402d.rawbtprinter;S.orientation=portrait;end;`;
    
    status.innerText = "Sende Bild an RawBT...";
    window.location.href = intentUrl;
}
</script>

</body>
</html>
