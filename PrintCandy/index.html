<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PeriPage A6 Pro (FF02 Fix)</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Segoe UI', sans-serif; text-align: center; background-color: #f4f7f6; padding: 20px; }
        .card { background: white; border-radius: 15px; padding: 25px; box-shadow: 0 8px 16px rgba(0,0,0,0.1); max-width: 400px; margin: auto; }
        button { width: 100%; padding: 14px; margin: 8px 0; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 16px; }
        #btnConnect { background: #2563eb; color: white; }
        #btnListen { background: #10b981; color: white; }
        #btnFeed { background: #ef4444; color: white; }
        button:disabled { background: #ccc; opacity: 0.6; }
        #status { margin: 15px 0; font-weight: bold; color: #2563eb; min-height: 1.5em; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        canvas { display: none; }
    </style>
</head>
<body>

<div class="card">
    <h2>PeriPage A6 Voice</h2>
    
    <label>Muster (RegEx):</label>
    <input type="text" id="pattern" value="Zahl (\d{4}) bitte">

    <button id="btnConnect">1. Drucker verbinden</button>
    <button id="btnListen" disabled>2. Start Sprache</button>
    <button id="btnFeed" disabled>Test: Papier schieben</button>

    <div id="status">Bereit.</div>
    <canvas id="canvas" width="384" height="240"></canvas>
</div>

<script>
    let printerChar = null;
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const status = document.getElementById('status');

    // Deine in nRF Connect gefundenen UUIDs
    const SERVICE_UUID = 0xFF00; 
    const CHAR_UUID = 0xFF02;

    document.getElementById('btnConnect').onclick = async () => {
        try {
            status.innerText = "Suche Gerät...";
            const device = await navigator.bluetooth.requestDevice({
                filters: [{ namePrefix: 'PeriPage' }, { namePrefix: 'A6' }],
                optionalServices: [SERVICE_UUID]
            });

            const server = await device.gatt.connect();
            const service = await server.getPrimaryService(SERVICE_UUID);
            printerChar = await service.getCharacteristic(CHAR_UUID);

            // Wake up Sequenz senden
            status.innerText = "Initialisiere...";
            await sendData(new Uint8Array([0x10, 0xff, 0x2f, 0x11]));
            await new Promise(r => setTimeout(r, 200));

            status.innerText = "Verbunden & Bereit!";
            document.getElementById('btnListen').disabled = false;
            document.getElementById('btnFeed').disabled = false;
        } catch (err) {
            status.innerText = "Fehler: " + err.message;
        }
    };

    // Papiervorschub Test
    document.getElementById('btnFeed').onclick = async () => {
        status.innerText = "Sende Feed...";
        // ESC J 100
        await sendData(new Uint8Array([0x1b, 0x4a, 0x64]));
        status.innerText = "Feed gesendet.";
    };

    // Spracherkennung
    const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    recognition.lang = 'de-DE';
    recognition.onresult = (e) => {
        const text = e.results[e.results.length - 1][0].transcript;
        const match = text.match(new RegExp(document.getElementById('pattern').value, "i"));
        if (match && match[1]) {
            status.innerText = "Drucke: " + match[1];
            printNumber(match[1]);
        }
    };
    document.getElementById('btnListen').onclick = () => recognition.start();

    function printNumber(num) {
        ctx.fillStyle = "white";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "black";
        ctx.font = "bold 110px 'Dancing Script'";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.save();
        ctx.translate(canvas.width / 2, canvas.height / 2);
        ctx.rotate(Math.PI / 2);
        ctx.fillText(num, 0, 0);
        ctx.restore();
        sendCanvas();
    }

    async function sendCanvas() {
        const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const bytesPerLine = canvas.width / 8;
        
        // Init
        await sendData(new Uint8Array([0x1b, 0x40, 0x10, 0xff, 0x2f, 0x11]));

        for (let y = 0; y < canvas.height; y++) {
            let line = new Uint8Array(bytesPerLine);
            for (let x = 0; x < canvas.width; x++) {
                const idx = (y * canvas.width + x) * 4;
                if ((imgData.data[idx] + imgData.data[idx+1] + imgData.data[idx+2]) / 3 < 128) {
                    line[Math.floor(x / 8)] |= (0x80 >> (x % 8));
                }
            }
            // PeriPage A6 Line-Print: 0x12 0x54 [Width]
            await sendData(new Uint8Array([0x12, 0x54, bytesPerLine]));
            await sendData(line);
        }
        // Feed
        await sendData(new Uint8Array([0x1b, 0x4a, 0x64]));
        status.innerText = "Fertig!";
    }

    async function sendData(data) {
        if (!printerChar) return;
        const chunkSize = 20;
        for (let i = 0; i < data.length; i += chunkSize) {
            const chunk = data.slice(i, i + chunkSize);
            // FF02 braucht meist writeWithoutResponse
            await printerChar.writeValueWithoutResponse(chunk);
            await new Promise(r => setTimeout(r, 10)); 
        }
    }
</script>
</body>
</html>
